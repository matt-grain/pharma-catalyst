repos:
  # All hooks run on push only - allows agents to commit freely during experiment runs
  # Quality checks happen before sharing code, not during rapid iteration
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
        stages: [pre-push]
      - id: ruff-format
        stages: [pre-push]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-push]
      - id: end-of-file-fixer
        stages: [pre-push]
      - id: check-yaml
        stages: [pre-push]
      - id: check-added-large-files
        stages: [pre-push]

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright src/
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
      - id: ty
        name: ty
        entry: uv run ty check src/
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

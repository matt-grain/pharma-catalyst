archivist_task:
  description: >
    You are a Literature Archivist gathering recent research on {property} prediction.

    Your goal: Build a searchable knowledge base of techniques from recent papers.

    CRITICAL WORKFLOW - You MUST complete ALL steps:
    1. Search arxiv for "{property} prediction" papers (use search_arxiv)
    2. For EACH paper found with an arxiv ID (format XXXX.XXXXX):
       a. Fetch the paper content (use fetch_arxiv_paper with the paper ID)
       b. IMMEDIATELY store it (use store_paper with the fetched content)
    3. Repeat search with related terms: "molecular property prediction", "ADMET ML"

    MANDATORY: After EVERY fetch_arxiv_paper call, you MUST call store_paper!
    Pass the entire fetched content directly to store_paper - it will extract the paper info.

    Example workflow:
    - Call: fetch_arxiv_paper("2401.12345")
    - Get: "=== Paper 2401.12345 === Title: ... Summary: ..."
    - Call: store_paper(<the entire response above>)
    - Get: "Stored paper 2401.12345 with embedding"

    Store at least 5-10 papers before finishing.

    Output format:
    PAPERS STORED: [count]
    KEY TECHNIQUES:
    - [technique from paper X]
    - [technique from paper Y]
  expected_output: >
    Summary of papers indexed with list of key techniques discovered
  agent: archivist_agent

hypothesis_task:
  description: >
    You are a Research Scientist proposing improvements for {property} prediction.

    Current baseline {metric}: {baseline_score}

    {agent_memory}

    This run's experiments: {experiment_history}

    FIRST: Query the literature database for recent techniques (use query_literature tool)
    with queries like "gradient boosting features" or "attention mechanism molecular".

    IF you're stuck or need fresh ideas:
    - Use fetch_more_papers tool with a specific query (e.g., "molecular descriptors solubility")
    - This searches arxiv for new papers and adds them to your literature database
    - Then query_literature again to find relevant techniques

    Based on the memory AND literature insights, propose ONE specific change that:
    1. Is DIFFERENT from what failed before (check "What Failed" section!)
    2. Builds on what worked (check "What Worked" section)
    3. Is informed by recent research (check literature query results)
    4. Is specific and implementable in train.py

    Output format:
    LITERATURE INSIGHT: [what the recent papers suggest]
    PROPOSAL: [one-line description of the change]
    REASONING: [WHY this approach - what scientific/ML principle supports it]
    CHANGE: [specific code modification needed]
  expected_output: >
    A specific, implementable proposal with clear reasoning informed by recent literature
  agent: hypothesis_agent

implement_task:
  description: >
    Implement the proposal from the Research Scientist in train.py.

    Steps:
    1. Read current train.py
    2. If you need a package that's not installed, use install_package tool first
    3. Modify code to implement the proposal
    4. Use write_train_py tool with the COMPLETE file content
    5. Run code_check tool to verify no linting/type errors
    6. If errors found, fix them and repeat steps 4-5

    Rules:
    - Modify ONLY train.py
    - Keep the same function signature: train() -> float (returns the metric score)
    - MUST pass code_check before finishing (no ruff linting errors)
    - Use install_package for packages like lightgbm, xgboost, catboost if needed
  expected_output: >
    Confirmation that train.py passes code_check with no errors
  agent: model_agent

evaluate_task:
  description: >
    Run the modified train.py and evaluate results.

    IMPORTANT: The current baseline {metric} is exactly {baseline_score}.
    Direction: {direction} (if "lower_is_better", smaller values are better; if "higher_is_better", larger values are better)

    Steps:
    1. Use the run_train_py tool to execute training
    2. The tool returns "{metric}:X.XXXX" - extract this value
    3. Compare to baseline {baseline_score} using the direction above
    4. Recommend: KEEP (if improved) or REVERT (if worse or equal)

    Output format:
    {metric}: [value from run_train_py tool]
    BASELINE: {baseline_score}
    IMPROVEMENT: [percentage if better, or "WORSE"]
    RECOMMENDATION: [KEEP or REVERT]
  expected_output: >
    Evaluation with exact {metric} from tool, comparison to {baseline_score}, and recommendation
  agent: evaluator_agent

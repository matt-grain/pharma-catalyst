hypothesis_task:
  description: >
    You are a Research Scientist proposing improvements for {property} prediction.

    Current baseline RMSE: {baseline_rmse}

    {agent_memory}

    This run's experiments: {experiment_history}

    Based on the memory above, propose ONE specific change that:
    1. Is DIFFERENT from what failed before (check "What Failed" section!)
    2. Builds on what worked (check "What Worked" section)
    3. Is specific and implementable in train.py

    Output format:
    PROPOSAL: [one-line description of the change]
    REASONING: [WHY this approach - what scientific/ML principle supports it]
    CHANGE: [specific code modification needed]
  expected_output: >
    A specific, implementable proposal with clear reasoning
  agent: hypothesis_agent

implement_task:
  description: >
    Implement the proposal from the Research Scientist in train.py.

    Steps:
    1. Read current train.py
    2. Modify code to implement the proposal
    3. Use write_train_py tool with the COMPLETE file content
    4. Run code_check tool to verify no linting/type errors
    5. If errors found, fix them and repeat steps 3-4

    Rules:
    - Modify ONLY train.py
    - Keep the same function signature: train() -> float (returns RMSE)
    - MUST pass code_check before finishing (no ruff linting errors)
  expected_output: >
    Confirmation that train.py passes code_check with no errors
  agent: model_agent

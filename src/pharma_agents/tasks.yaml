hypothesis_task:
  description: >
    Review the experiment history and current train.py implementation.
    Propose ONE specific change to improve {property} prediction RMSE.

    Current baseline RMSE: {baseline_rmse}
    Previous experiments: {experiment_history}

    Your proposal must be:
    1. Specific and implementable (not vague like "try different models")
    2. Different from previous failed attempts
    3. Justified with reasoning

    Output format:
    PROPOSAL: [one-line description]
    CHANGE: [specific code change needed]
    REASONING: [why this might improve RMSE]
  expected_output: >
    A specific, implementable proposal for improving the model
  agent: hypothesis_agent

implement_task:
  description: >
    Implement the proposal from the Research Scientist in train.py.

    Rules:
    - Modify ONLY train.py
    - Keep the same function signature: train() -> float (returns RMSE)
    - Ensure code is syntactically correct
    - Use the write_train_py tool with the COMPLETE file content
  expected_output: >
    Confirmation that train.py has been modified with the proposed change
  agent: model_agent

evaluate_task:
  description: >
    Run the modified train.py and evaluate results.

    IMPORTANT: The current baseline RMSE is exactly {baseline_rmse} - use this value for comparison.

    Steps:
    1. Use the run_train_py tool to execute training
    2. The tool returns "RMSE:X.XXXX" - extract this value
    3. Compare to baseline {baseline_rmse}: if new RMSE < {baseline_rmse}, it's an improvement
    4. Recommend: KEEP (if RMSE < {baseline_rmse}) or REVERT (if RMSE >= {baseline_rmse})

    Output format:
    RMSE: [value from run_train_py tool]
    BASELINE: {baseline_rmse}
    IMPROVEMENT: [percentage if better, or "WORSE"]
    RECOMMENDATION: [KEEP or REVERT]
  expected_output: >
    Evaluation with exact RMSE from tool, comparison to {baseline_rmse}, and recommendation
  agent: evaluator_agent
